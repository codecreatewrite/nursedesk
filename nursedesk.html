<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NurseDesk</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      padding: 20px;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 16px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    header h1 { font-size: 22px; }
    header p { font-size: 13px; opacity: 0.7; margin-top: 4px; }

    #summary {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-box {
      flex: 1;
      background: white;
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .stat-box .number {
      font-size: 28px;
      font-weight: bold;
      color: #2c3e50;
    }

    .stat-box .label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .stat-box.critical-box .number { color: #e74c3c; }

    button {
      background: #2c3e50;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 16px;
    }

    button:active { opacity: 0.8; }

    .patient-card {
      background: white;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 10px;
      border-left: 5px solid #3498db;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .patient-card.critical {
      border-left-color: #e74c3c;
      background: #fff8f8;
    }

    .patient-name {
      font-size: 16px;
      font-weight: bold;
      color: #2c3e50;
    }

    .patient-ward {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }

    .patient-detail {
      font-size: 14px;
      color: #444;
      margin: 3px 0;
    }

    .status-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge-critical {
      background: #fdecea;
      color: #e74c3c;
    }

    .badge-stable {
      background: #eafaf1;
      color: #27ae60;
    }
  </style>
</head>
<body>

  <header>
    <h1>NurseDesk</h1>
    <p>Ward Patient Dashboard</p>
  </header>

  <div id="summary">
    <div class="stat-box">
      <div class="number" id="totalCount">--</div>
      <div class="label">Total Patients</div>
    </div>
    <div class="stat-box critical-box">
      <div class="number" id="criticalCount">--</div>
      <div class="label">Critical</div>
    </div>
    <div class="stat-box">
      <div class="number" id="stableCount">--</div>
      <div class="label">Stable</div>
    </div>
  </div>

  <button id="loadBtn">Load Patients</button>
  <div id="patientList"></div>

  <script>
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "nursedesk_login.html"
    }
    document.getElementById("loadBtn").addEventListener("click", async function () {
      const response = await fetch("https://nursedesk.onrender.com/patients", {
        headers: { "Authorization": "Bearer " + TOKEN }
      });

      const patients = await response.json();
      const container = document.getElementById("patientList");
      container.innerHTML = "";

      let criticalCount = 0;

      patients.forEach(function (patient) {
        if (patient.is_critical) criticalCount++;

        const card = document.createElement("div");
        card.className = "patient-card" + (patient.is_critical ? " critical" : "");

        const badgeClass = patient.is_critical ? "badge-critical" : "badge-stable";
        const badgeText = patient.is_critical ? "⚠ Critical" : "Stable";

        card.innerHTML = `
          <div class="patient-name">${patient.name}</div>
          <div class="patient-ward">${patient.ward}</div>
          <div class="patient-detail">Diagnosis: ${patient.diagnosis}</div>
          <div class="patient-detail">Medication: ${patient.medication}</div>
          <span class="status-badge ${badgeClass}">${badgeText}</span>
        `;

        container.appendChild(card);
      });

      document.getElementById("totalCount").textContent = patients.length;
      document.getElementById("criticalCount").textContent = criticalCount;
      document.getElementById("stableCount").textContent = patients.length - criticalCount;
    });
  </script>

</body>
</html>
